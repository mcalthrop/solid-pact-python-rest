name: Validate OpenAPI Python codegen

on:
  push:
    branches: [main]
  pull_request:

jobs:
  openapi-python-codegen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/pyproject.toml

      - name: Install API dev dependencies
        working-directory: apps/api
        run: python -m pip install -e ".[dev]"

      - name: Regenerate OpenAPI Pydantic models
        working-directory: apps/api
        run: python scripts/generate_openapi_models.py

      - name: Fail if generated models are out of sync with the spec
        run: git diff --exit-code -- apps/api/recipes_api/generated/
