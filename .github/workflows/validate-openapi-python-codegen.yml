name: Validate OpenAPI Python codegen

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  openapi-python-codegen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/pyproject.toml

      - name: Install API dev dependencies
        working-directory: apps/api
        run: python -m pip install -e ".[dev]"

      - name: Regenerate OpenAPI Pydantic models
        working-directory: apps/api
        run: python scripts/generate_openapi_models.py

      - name: Fail if generated models are out of sync with the spec
        run: |
          set -ux

          GENERATED_PATH="apps/api/recipes_api/generated"
          git diff --exit-code -- "$GENERATED_PATH"
          if [[ -n "$(git status --porcelain -- "$GENERATED_PATH")" ]]; then
            echo "Untracked or uncommitted changes under ${GENERATED_PATH}. Regenerate and commit."
            git status --porcelain -- "$GENERATED_PATH"
            exit 1
          fi
